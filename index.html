<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cipher</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Cipher">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#3266ad">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── AUTH ──────────────────────────────────────────────────────────────── -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><i class="ti ti-wallet" aria-hidden="true"></i> Cipher</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign up</button>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="form-group" id="confirm-wrap" style="display:none">
      <label class="form-label">Confirm password</label>
      <input id="auth-confirm" type="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn-save" id="auth-submit" onclick="handleAuth()" style="width:100%;margin-top:4px">Sign in</button>
    <div class="auth-msg err" id="auth-msg"></div>
  </div>
</div>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app-wrap" style="display:none">

  <!-- Mobile header -->
  <header class="mobile-header">
    <div class="mobile-logo"><i class="ti ti-wallet" aria-hidden="true"></i> Cipher</div>
    <div class="mobile-controls">
      <select class="cur-select-sm" id="cur-select-mob" onchange="setCurrency(this.value)"></select>
      <button class="icon-btn" onclick="handleSignOut()" title="Sign out">
        <i class="ti ti-logout" aria-hidden="true"></i>
      </button>
    </div>
  </header>

  <!-- App + modals -->
  <div style="position:relative;flex:1;display:flex;overflow:hidden">
    <div class="app">

      <div class="sidebar">
        <div class="logo"><i class="ti ti-wallet" aria-hidden="true"></i> Cipher</div>
        <div class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</div>
        <div class="nav-item" data-page="transactions"><i class="ti ti-list" aria-hidden="true"></i> Transactions</div>
        <div class="nav-item" data-page="budgets"><i class="ti ti-target" aria-hidden="true"></i> Budgets</div>
        <div class="sidebar-bottom">
          <div class="currency-label">Currency</div>
          <select class="cur-select" id="cur-select" onchange="setCurrency(this.value)"></select>
          <button class="signout-btn" onclick="handleSignOut()">
            <i class="ti ti-logout" style="font-size:14px" aria-hidden="true"></i> Sign out
          </button>
        </div>
      </div>

      <div class="main">

        <!-- Dashboard -->
        <div class="page active" id="page-dashboard">
          <div class="page-title" id="dash-title">Overview</div>
          <div class="metrics">
            <div class="metric"><div class="metric-label">Balance</div><div class="metric-value" id="m-balance">0</div></div>
            <div class="metric"><div class="metric-label">Income</div><div class="metric-value income" id="m-income">0</div></div>
            <div class="metric"><div class="metric-label">Expenses</div><div class="metric-value expense" id="m-expense">0</div></div>
          </div>
          <div class="card">
            <div class="section-title">Spending by category</div>
            <div class="chart-wrap"><canvas id="catChart" role="img" aria-label="Spending by category"></canvas></div>
            <div id="chart-legend" style="display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:8px;font-size:12px"></div>
          </div>
          <div class="card">
            <div class="section-title">Recent transactions</div>
            <div id="dash-txns"><div class="empty">No transactions yet. Add one!</div></div>
          </div>
        </div>

        <!-- Transactions -->
        <div class="page" id="page-transactions">
          <div class="page-title">Transactions</div>
          <button class="add-btn" id="openModal"><i class="ti ti-plus" aria-hidden="true"></i> Add transaction</button>
          <div class="card"><div id="all-txns"><div class="empty">No transactions yet.</div></div></div>
        </div>

        <!-- Budgets -->
        <div class="page" id="page-budgets">
          <div class="page-title">Monthly budgets</div>
          <button class="add-btn" onclick="openBudgetModal()"><i class="ti ti-plus" aria-hidden="true"></i> Add budget</button>
          <div id="budget-list"></div>
        </div>

      </div>
    </div>

    <!-- Budget modal -->
    <div class="modal-overlay" id="budget-modal" style="display:none">
      <div class="modal">
        <div class="modal-title" id="budget-modal-title">Add budget</div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <input id="b-cat" placeholder="e.g. Subscriptions">
        </div>
        <div class="form-group">
          <label class="form-label" id="b-amount-label">Monthly limit</label>
          <input id="b-amount" type="number" placeholder="0" min="0" step="any">
        </div>
        <div class="modal-actions">
          <button class="btn-danger" id="b-delete-btn" onclick="deleteBudget()" style="display:none">Delete</button>
          <button class="btn-cancel" onclick="closeBudgetModal()">Cancel</button>
          <button class="btn-save" onclick="saveBudget()">Save</button>
        </div>
      </div>
    </div>

    <!-- Transaction modal -->
    <div class="modal-overlay" id="modal" style="display:none">
      <div class="modal">
        <div class="modal-title">Add transaction</div>
        <div class="type-toggle">
          <button class="type-btn active-inc" id="typeInc" onclick="setType('income')">Income</button>
          <button class="type-btn" id="typeExp" onclick="setType('expense')">Expense</button>
        </div>
        <div class="form-group"><label class="form-label">Description</label><input id="f-desc" placeholder="e.g. Grocery run"></div>
        <div class="form-group"><label class="form-label" id="amount-label">Amount</label><input id="f-amount" type="number" placeholder="0" min="0" step="any"></div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="f-cat">
            <option value="Salary">Salary</option>
            <option value="Freelance">Freelance</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Date</label><input id="f-date" type="date"></div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" id="save-btn" onclick="saveTransaction()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav">
    <button class="bottom-nav-btn active" data-page="dashboard">
      <i class="ti ti-layout-dashboard" aria-hidden="true"></i><span>Home</span>
    </button>
    <button class="bottom-nav-btn" data-page="transactions">
      <i class="ti ti-list" aria-hidden="true"></i><span>Transactions</span>
    </button>
    <button class="bottom-nav-btn" data-page="budgets">
      <i class="ti ti-target" aria-hidden="true"></i><span>Budgets</span>
    </button>
  </nav>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="app.js"></script>
</body>
</html>
